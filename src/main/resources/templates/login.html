<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fafafa;
            color: #111;

            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* ===== Login Card ===== */
        .login-container {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 36px;
            border-radius: 14px;

            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .login-container h2 {
            margin: 0 0 24px;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.4px;
        }

        /* ===== Form ===== */
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input[type="text"],
        input[type="password"] {
            padding: 12px 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            color: #111;

            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input::placeholder {
            color: #777;
        }

        input:focus {
            outline: none;
            border-color: #111;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
        }

        /* ===== Button ===== */
        button {
            margin-top: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;

            background: #111;
            color: #fff;
            border: none;
            cursor: pointer;

            transition: background 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background: #000;
            transform: translateY(-1px);
        }

        /* ===== Messages ===== */
        .message {
            margin-top: 18px;
            font-size: 14px;
            text-align: center;
        }

        .error {
            color: #111;
            background: #f1f1f1;
            padding: 10px 14px;
            border-radius: 8px;
        }

        .success {
            color: #111;
            background: #ededed;
            padding: 10px 14px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Login</h2>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="message error" th:if="${param.error}">
        Invalid credentials
    </div>

    <div class="message success" th:if="${param.logout}">
        Logged out successfully
    </div>
    <div style="margin-top: 16px; text-align: center;">
        <a th:href="@{/dashboard}" style="text-decoration: none;">
            <button type="button">Continue to Dashboard</button>
        </a>
    </div>

</div>

</body>
</html>
