<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
  <title th:text="${post.title}">Blog</title>

  <style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #fafafa;
        margin: 0;
        padding: 0;
        color: #111;
    }

    .container {
        width: 75%;
        margin: 40px auto;
        background: #fff;
        padding: 36px;
        border-radius: 12px;
        box-shadow: 0 18px 36px rgba(0,0,0,0.08);
    }

    h1 {
        margin: 10px 0 6px;
        font-size: 30px;
        letter-spacing: -0.6px;
    }

    h2 {
        margin-top: 0;
        font-size: 22px;
        font-weight: 700;
    }

    h3 {
        margin-top: 40px;
        font-size: 20px;
    }

    .meta {
        color: #666;
        font-size: 14px;
        margin-bottom: 18px;
    }

    .excerpt {
        font-style: italic;
        color: #444;
        margin-bottom: 20px;
        font-size: 16px;
    }

    .content {
        line-height: 1.7;
        margin-bottom: 28px;
        font-size: 16px;
    }

    /* ===== TAGS ===== */
    .tags {
        margin-bottom: 28px;
    }

    .tags span {
        display: inline-block;
        margin-right: 10px;
        font-size: 13px;
        color: #555;
    }

    .tags span::before {
        content: "#";
        margin-right: 2px;
        color: #999;
    }

    /* ===== TOP ACTIONS ===== */
    .top-actions {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 20px;
    }

    .back-btn {
        background: #111;
        color: #fff;
        padding: 8px 16px;
        border-radius: 4px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-btn:hover {
        background: #000;
        transform: translateY(-1px);
    }

    /* ===== POST ACTIONS ===== */
    .post-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

    .post-actions form {
        margin: 0;
    }

    /* ===== BUTTONS ===== */
    button {
        background: #111;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
        background: #000;
        transform: translateY(-1px);
    }

    .delete-btn {
        background: #fff;
        color: #111;
        border: 1px solid #ccc;
    }

    .delete-btn:hover {
        background: #f3f3f3;
    }

    /* ===== COMMENTS ===== */
    .comments {
        margin-top: 48px;
    }

    .comment {
        padding: 18px 0;
        border-bottom: 1px solid #e5e5e5;
    }

    .comment p {
        margin: 6px 0;
        font-size: 15px;
    }

    .comment-actions {
        margin-top: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .comment-actions a {
        font-size: 14px;
        text-decoration: none;
        color: #111;
        font-weight: 500;
    }

    .comment-actions a:hover {
        text-decoration: underline;
    }

    /* ===== FORMS ===== */
    textarea,
    input {
        width: 100%;
        padding: 10px 12px;
        margin: 8px 0;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-size: 14px;
        background: #fff;
        color: #111;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus,
    input:focus {
        outline: none;
        border-color: #111;
        box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
    }

    .cancel-link {
        margin-left: 10px;
        font-size: 14px;
        text-decoration: none;
        color: #555;
    }

    .cancel-link:hover {
        text-decoration: underline;
    }

    hr {
        border: none;
        border-top: 1px solid #e5e5e5;
        margin: 24px 0;
    }
  </style>

</head>

<body>

<div class="container">

  <h2>My Blog Application</h2>

  <div class="top-actions">
    <a th:href="@{/dashboard}" class="back-btn">
      Back to Dashboard
    </a>
  </div>


  <hr>

  <h1 th:text="${post.title}"></h1>

  <div class="meta">
    <span th:text="${post.author}"></span>,
    <span th:text="${#temporals.format(post.publishedAt, 'dd/MM/yyyy')}"></span>
  </div>

  <div class="excerpt" th:text="${post.excerpt}"></div>

  <div class="content" th:text="${post.content}"></div>

  <div class="tags">
    <b>Tags:</b>
    <span th:each="tag : ${post.tags}" th:text="${tag.name}"></span>
  </div>

  <div class="post-actions"
       sec:authorize="isAuthenticated()"
       th:if="${#authentication.authorities.?[authority == 'ROLE_ADMIN'].size() > 0
          or #authentication.name == post.author}">

    <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="get">
      <button type="submit">Edit</button>
    </form>

    <form th:action="@{/posts/{id}/delete(id=${post.id})}"
          method="post"
          onsubmit="return confirm('Are you sure?')">
      <button type="submit" class="delete-btn">Delete</button>
    </form>

  </div>


  <div class="comments">
    <h3>Comments</h3>

    <div th:each="comment : ${post.comments}" class="comment">

      <!-- NORMAL VIEW -->
      <div th:if="${editCommentId == null or editCommentId != comment.id}">
        <p>
          <b th:text="${comment.name}"></b>
          (<span th:text="${comment.email}"></span>)
        </p>

        <p th:text="${comment.comment}"></p>


        <div sec:authorize="hasRole('ADMIN')">

          <div class="comment-actions">
            <a th:href="@{'/comments/' + ${comment.id} + '/edit'}">Edit</a>

            <form th:action="@{'/comments/' + ${comment.id} + '/delete'}"
                  method="post"
                  style="display:inline;">
              <button type="submit" class="delete-btn">Delete</button>
            </form>
          </div>

        </div>


        <div th:if="${editCommentId != null and editCommentId == comment.id}">
        <form th:action="@{'/comments/' + ${comment.id} + '/update'}" method="post">

          <input type="text" name="name"
                 th:value="${comment.name}" required>

          <input type="email" name="email"
                 th:value="${comment.email}" required>

          <textarea name="comment" required
                    th:text="${comment.comment}"></textarea>

          <button type="submit">Update</button>
          <a th:href="@{'/posts/' + ${post.id}}" class="cancel-link">Cancel</a>
        </form>

      </div>
      </div>
    </div>

    <h4>Add Comment</h4>
    <form th:action="@{'/posts/' + ${post.id} + '/comments'}" method="post">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="comment" placeholder="Comment" required></textarea>
      <button type="submit">Add Comment</button>
    </form>

  </div>

</div>

</body>
</html>
