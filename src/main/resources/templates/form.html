    <!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Create / Edit Post</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #fafafa;
                margin: 0;
                padding: 0;
                color: #111;
            }

            .form-container {
                max-width: 700px;
                margin: 50px auto;
                background: #ffffff;
                padding: 28px;
                border-radius: 10px;
                box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08);
            }

            .form-container h2 {
                margin-top: 0;
                margin-bottom: 24px;
                text-align: center;
                font-size: 26px;
                font-weight: 700;
                letter-spacing: -0.4px;
            }

            input[type="text"],
            textarea {
                width: 97%;
                padding: 12px 14px;
                margin-bottom: 16px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-size: 15px;
                background: #fff;
                color: #111;

                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }

            textarea {
                resize: vertical;
            }

            input::placeholder,
            textarea::placeholder {
                color: #777;
            }

            input:focus,
            textarea:focus {
                border-color: #111;
                outline: none;
                box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
            }

            button {
                background-color: #111;
                color: #ffffff;
                padding: 12px 22px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 15px;
                font-weight: 600;

                transition: background 0.2s ease, transform 0.2s ease;
            }

            button:hover {
                background-color: #000;
                transform: translateY(-1px);
            }
        </style>

    </head>

    <body>

    <div class="form-container">
        <h2 th:text="${post != null} ? 'Edit Post' : 'Create New Post'"></h2>

        <form th:action="${post != null} ? @{/posts/{id}/update(id=${post.id})} : @{/posts}"
              method="post">

            <input type="text" name="title"
                   th:value="${post != null} ? ${post.title} : ''"
                   placeholder="Title" required>

            <input type="text" name="tags"
                   th:value="${tags}"
                   placeholder="Comma separated tags">

            <textarea name="excerpt" rows="5"
                      th:text="${post != null} ? ${post.excerpt} : ''"
                      placeholder="Add excerpt"
                      required></textarea>

            <textarea name="content" rows="10"
                      th:text="${post != null} ? ${post.content} : ''"
                      placeholder="Add content"
                      required></textarea>

            <button type="submit"
                    th:text="${post != null} ? 'Update' : 'Publish'"></button>
        </form>
    </div>

    </body>
    </html>
